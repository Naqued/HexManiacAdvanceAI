name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore and build solution
        run: dotnet build HexManiacAdvance.sln -c Release

      - name: Publish self-contained exe
        run: >
          dotnet publish src/HexManiac.WPF/HexManiac.WPF.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o ./publish

      - name: Zip release
        run: Compress-Archive -Path ./publish/* -DestinationPath HexManiacAdvance-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexManiacAdvance-win-x64
          path: HexManiacAdvance-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: HexManiacAdvance-win-x64.zip
